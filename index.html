<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>激光能量密度计算器</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe6;
      --bg-2: #e8f0ff;
      --card: rgba(255, 255, 255, 0.72);
      --card-border: rgba(33, 37, 41, 0.1);
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
      --accent-2: #f97316;
      --shadow: 0 20px 60px rgba(31, 41, 55, 0.12);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Avenir Next", "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.14), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(249, 115, 22, 0.13), transparent 24%),
        linear-gradient(135deg, var(--bg), var(--bg-2));
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: min(1080px, 100%);
      display: grid;
      gap: 20px;
      grid-template-columns: 1.1fr 0.9fr;
    }

    .hero,
    .panel {
      background: var(--card);
      backdrop-filter: blur(18px);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
    }

    .hero {
      padding: 32px;
      position: relative;
      overflow: hidden;
      min-height: 420px;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -80px -80px auto;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(15, 118, 110, 0.18), transparent 70%);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(15, 118, 110, 0.1);
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      margin: 18px 0 12px;
      font-size: clamp(32px, 5vw, 58px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 0 0 26px;
      font-size: 17px;
      line-height: 1.75;
      color: var(--muted);
      max-width: 52ch;
    }

    .formula {
      display: grid;
      gap: 14px;
      padding: 18px 20px;
      margin-top: 24px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(31, 41, 55, 0.08);
    }

    .formula strong {
      font-size: 18px;
    }

    .formula code {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 16px;
      color: #0f172a;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 22px;
    }

    .stat {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid rgba(31, 41, 55, 0.08);
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .stat strong {
      font-size: 26px;
      letter-spacing: -0.03em;
    }

    .panel {
      padding: 28px;
      display: grid;
      align-content: start;
      gap: 16px;
    }

    .panel h2 {
      margin: 0;
      font-size: 24px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 14px;
      color: var(--muted);
    }

    input {
      width: 100%;
      padding: 15px 16px;
      border-radius: 16px;
      border: 1px solid rgba(31, 41, 55, 0.12);
      background: rgba(255, 255, 255, 0.84);
      color: var(--text);
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      border-color: rgba(15, 118, 110, 0.45);
      box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
      transform: translateY(-1px);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .result {
      margin-top: 8px;
      padding: 22px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(15, 118, 110, 0.1), rgba(249, 115, 22, 0.08));
      border: 1px solid rgba(31, 41, 55, 0.08);
    }

    .result .label {
      display: block;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 10px;
    }

    .result .value {
      font-size: clamp(34px, 5vw, 48px);
      font-weight: 800;
      letter-spacing: -0.05em;
      color: #0f172a;
    }

    .result .unit {
      display: inline-block;
      margin-left: 6px;
      font-size: 16px;
      color: var(--accent);
      font-weight: 700;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .footer-note {
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 920px) {
      .shell {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      body { padding: 14px; }
      .hero, .panel { padding: 20px; border-radius: 20px; }
      .row, .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="eyebrow">Laser Energy Density</div>
      <h1>激光能量密度计算器</h1>
      <p class="subtitle">
        输入激光功率、扫描速度和光斑直径，页面会实时计算激光能量密度。
        适合做工艺估算、参数记录和快速对比。
      </p>

      <div class="formula">
        <strong>计算公式</strong>
        <code>能量密度 = 激光功率 / (扫描速度 × 光斑直径)</code>
        <code>单位：W / (mm/s × mm) = J/mm²</code>
      </div>

      <div class="stats">
        <div class="stat">
          <span>功率</span>
          <strong id="statPower">100</strong>
        </div>
        <div class="stat">
          <span>扫描速度</span>
          <strong id="statSpeed">200</strong>
        </div>
        <div class="stat">
          <span>光斑直径</span>
          <strong id="statSpot">0.50</strong>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>参数输入</h2>

      <div class="field">
        <label for="power">激光功率 (W)</label>
        <input id="power" type="number" step="0.1" min="0" value="100" />
      </div>

      <div class="row">
        <div class="field">
          <label for="speed">扫描速度 (mm/s)</label>
          <input id="speed" type="number" step="0.1" min="0.000001" value="200" />
        </div>
        <div class="field">
          <label for="spot">光斑直径 (mm)</label>
          <input id="spot" type="number" step="0.01" min="0.000001" value="0.5" />
        </div>
      </div>

      <div class="result" aria-live="polite">
        <span class="label">激光能量密度</span>
        <div class="value"><span id="result">1.000000</span><span class="unit">J/mm²</span></div>
      </div>

      <p class="hint">
        当输入无效或不大于 0 时，结果会提示你先修正参数。
      </p>
      <p class="footer-note">
        你可以直接用浏览器打开这个文件，也可以把它部署成静态网页。
      </p>
    </section>
  </main>

  <script>
    const powerInput = document.getElementById("power");
    const speedInput = document.getElementById("speed");
    const spotInput = document.getElementById("spot");
    const result = document.getElementById("result");
    const statPower = document.getElementById("statPower");
    const statSpeed = document.getElementById("statSpeed");
    const statSpot = document.getElementById("statSpot");

    function parseValue(input) {
      const value = Number(input.value);
      return Number.isFinite(value) ? value : NaN;
    }

    function update() {
      const power = parseValue(powerInput);
      const speed = parseValue(speedInput);
      const spot = parseValue(spotInput);

      statPower.textContent = Number.isFinite(power) ? power.toFixed(1).replace(/\.0$/, "") : "-";
      statSpeed.textContent = Number.isFinite(speed) ? speed.toFixed(1).replace(/\.0$/, "") : "-";
      statSpot.textContent = Number.isFinite(spot) ? spot.toFixed(2) : "-";

      if (![power, speed, spot].every((n) => Number.isFinite(n)) || power < 0 || speed <= 0 || spot <= 0) {
        result.textContent = "请检查输入";
        return;
      }

      const density = power / (speed * spot);
      result.textContent = density.toFixed(6);
    }

    [powerInput, speedInput, spotInput].forEach((input) => {
      input.addEventListener("input", update);
    });

    update();
  </script>
</body>
</html>
